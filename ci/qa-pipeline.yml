# =============================================================================
# GitHub Actions — QA Pipeline (Phase 2)
# =============================================================================
# HOW TO ACTIVATE THIS FILE:
#   Copy it to your repo at:  .github/workflows/qa-pipeline.yml
#   GitHub will automatically pick it up on the next push.
#
# What it does:
#   1. Triggers on every push and pull request to main/develop
#   2. Installs Python 3.12 + all dependencies
#   3. Runs the Robot Framework smoke suite in parallel using pabot
#   4. Generates an Allure report and uploads it as a downloadable artifact
#   5. On failure, uploads screenshots and browser traces as a debug artifact
# =============================================================================

name: QA Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

  # Allows you to trigger a run manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  test:
    name: Robot Framework Tests (parallel)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      # Run all matrix variants even if one fails
      fail-fast: false
      matrix:
        # Add more suites here to fan them out across parallel jobs
        suite: [smoke]

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout source
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Set up Python 3.12
      # ------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ------------------------------------------------------------------
      # 3. Install Python dependencies
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ------------------------------------------------------------------
      # 4. Install Playwright browsers
      #    The Browser library needs this even in headless CI mode.
      # ------------------------------------------------------------------
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium firefox

      # ------------------------------------------------------------------
      # 5. Initialise the Robot Framework Browser library wrapper
      # ------------------------------------------------------------------
      - name: Initialise Browser library
        run: python -m Browser.entry init

      # ------------------------------------------------------------------
      # 6. Run tests in parallel using pabot
      #    --processes 4  → 4 parallel workers
      #    --listener     → generates Allure-compatible JSON alongside normal RF output
      # ------------------------------------------------------------------
      - name: Run ${{ matrix.suite }} tests
        run: |
          python -m pabot \
            --processes 4 \
            --outputdir results \
            --variable HEADLESS_MODE:True \
            --listener allure_robotframework:results/allure-results \
            tests/${{ matrix.suite }}/

      # ------------------------------------------------------------------
      # 7. Upload Allure results so the next step can render the report
      # ------------------------------------------------------------------
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.suite }}
          path: results/allure-results/
          retention-days: 30

      # ------------------------------------------------------------------
      # 8. Upload Robot Framework HTML logs as a separate artifact
      # ------------------------------------------------------------------
      - name: Upload RF logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-logs-${{ matrix.suite }}
          path: |
            results/log.html
            results/report.html
            results/output.xml
          retention-days: 14

      # ------------------------------------------------------------------
      # 9. On failure — upload browser traces for debugging
      # ------------------------------------------------------------------
      - name: Upload browser traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-traces-${{ matrix.suite }}
          path: results/browser/traces/
          retention-days: 7

  # --------------------------------------------------------------------------
  # Allure Report Job
  # Merges results from all suite jobs and publishes the combined HTML report.
  # Requires GitHub Pages to be enabled on the repo (Settings → Pages → Actions).
  # --------------------------------------------------------------------------
  allure-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results/

      - name: Generate Allure HTML report
        uses: simple-ams/allure-action@v1
        with:
          allure_results: allure-results/
          allure_report: allure-report/
          gh_pages: gh-pages
          allure_history: allure-history

      - name: Publish report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report/
