# =============================================================================
# Azure Pipelines — QA Pipeline
# =============================================================================
# HOW TO ACTIVATE THIS FILE:
#   This file is picked up automatically by Azure DevOps when placed at the
#   repo root or registered under Pipelines → New Pipeline → Azure Repos Git.
#
# What it does:
#   1. Triggers on every push and PR to main/develop
#   2. Installs Python 3.12 + all dependencies
#   3. Runs the Robot Framework smoke suite in parallel using pabot
#   4. Generates an Allure report and publishes it as a pipeline artifact
#   5. On failure, uploads screenshots and browser traces as a debug artifact
# =============================================================================

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  PYTHON_VERSION: "3.12"

stages:
  - stage: Test
    displayName: Robot Framework Tests
    jobs:
      - job: smoke
        displayName: Smoke Suite (parallel)
        timeoutInMinutes: 30

        steps:
          # ------------------------------------------------------------------
          # 1. Set up Python
          # ------------------------------------------------------------------
          - task: UsePythonVersion@0
            displayName: Set up Python $(PYTHON_VERSION)
            inputs:
              versionSpec: $(PYTHON_VERSION)
              addToPath: true

          # ------------------------------------------------------------------
          # 2. Install Python dependencies
          # ------------------------------------------------------------------
          - script: pip install -r requirements.txt
            displayName: Install dependencies

          # ------------------------------------------------------------------
          # 3. Install Playwright browsers
          # ------------------------------------------------------------------
          - script: playwright install --with-deps chromium firefox
            displayName: Install Playwright browsers

          # ------------------------------------------------------------------
          # 4. Initialise the Robot Framework Browser library wrapper
          # ------------------------------------------------------------------
          - script: python -m Browser.entry init
            displayName: Initialise Browser library

          # ------------------------------------------------------------------
          # 5. Run tests in parallel using pabot
          #    --processes 4  → 4 parallel workers
          #    --listener     → generates Allure-compatible JSON alongside RF output
          # ------------------------------------------------------------------
          - script: |
              python -m pabot \
                --processes 4 \
                --outputdir results \
                --variable HEADLESS_MODE:True \
                --listener allure_robotframework:results/allure-results \
                tests/smoke/
            displayName: Run smoke tests

          # ------------------------------------------------------------------
          # 6. Publish Allure results artifact
          # ------------------------------------------------------------------
          - task: PublishPipelineArtifact@1
            displayName: Publish Allure results
            condition: always()
            inputs:
              targetPath: results/allure-results
              artifact: allure-results-smoke
              publishLocation: pipeline

          # ------------------------------------------------------------------
          # 7. Publish Robot Framework HTML logs
          # ------------------------------------------------------------------
          - task: PublishPipelineArtifact@1
            displayName: Publish RF logs
            condition: always()
            inputs:
              targetPath: results
              artifact: robot-logs-smoke
              publishLocation: pipeline

          # ------------------------------------------------------------------
          # 8. On failure — publish browser traces for debugging
          # ------------------------------------------------------------------
          - task: PublishPipelineArtifact@1
            displayName: Publish browser traces (on failure)
            condition: failed()
            inputs:
              targetPath: results/browser/traces
              artifact: browser-traces-smoke
              publishLocation: pipeline

  # --------------------------------------------------------------------------
  # Allure Report Stage
  # Generates the combined HTML report and publishes it as a pipeline artifact.
  # Download from the pipeline run's Artifacts tab.
  # --------------------------------------------------------------------------
  - stage: Report
    displayName: Publish Allure Report
    dependsOn: Test
    condition: always()

    jobs:
      - job: allure_report
        displayName: Generate Allure HTML Report

        steps:
          - task: DownloadPipelineArtifact@2
            displayName: Download Allure results
            inputs:
              artifact: allure-results-smoke
              path: allure-results

          - script: |
              npm install -g allure-commandline --save-dev
              allure generate allure-results --clean -o allure-report
            displayName: Generate Allure HTML report

          - task: PublishPipelineArtifact@1
            displayName: Publish Allure HTML report
            inputs:
              targetPath: allure-report
              artifact: allure-report
              publishLocation: pipeline
